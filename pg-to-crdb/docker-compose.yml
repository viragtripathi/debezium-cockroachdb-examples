services:
  zookeeper:
    image: confluentinc/cp-zookeeper:${CONFLUENT_VERSION:-7.4.0}
    hostname: zookeeper
    container_name: pg2crdb-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:${CONFLUENT_VERSION:-7.4.0}
    hostname: kafka
    container_name: pg2crdb-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  postgres:
    image: postgres:${POSTGRES_VERSION:-16}
    hostname: postgres
    container_name: pg2crdb-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sourcedb
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  cockroachdb-target:
    image: cockroachdb/cockroach:${COCKROACHDB_VERSION:-v25.4.11}
    hostname: cockroachdb-target
    container_name: pg2crdb-cockroachdb-target
    command: start-single-node --insecure
    ports:
      - "26257:26257"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "--host=localhost:26257", "-e", "SELECT 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  connect:
    image: quay.io/debezium/connect:${DEBEZIUM_VERSION:-3.5.0.Final}
    hostname: connect
    container_name: pg2crdb-connect
    depends_on:
      - postgres
      - cockroachdb-target
      - kafka
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: pg2crdb-connect-cluster
      CONFIG_STORAGE_TOPIC: pg2crdb-connect-configs
      OFFSET_STORAGE_TOPIC: pg2crdb-connect-offsets
      STATUS_STORAGE_TOPIC: pg2crdb-connect-status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      LOG_LEVEL: INFO
      CONNECT_LOG4J_LOGGER_IO_DEBEZIUM: DEBUG
      CONNECT_LOG4J_LOGGER_ORG_APACHE_KAFKA: WARN

networks:
  default:
    name: pg2crdb-demo
