# Prometheus JMX exporter rules, mirroring the canonical Debezium monitoring example
# (debezium-examples/monitoring/debezium-jmx-exporter/config.yml). Maps the Debezium connector
# MBeans to debezium_metrics_<Attribute> series with plugin/name/context labels, plus the Kafka
# Connect worker/client metrics. The connector's snapshot|streaming MBeans match the last rule.
startDelaySeconds: 0
ssl: false
lowercaseOutputName: false
lowercaseOutputLabelNames: false
rules:
- pattern : "kafka.connect<type=connect-worker-metrics>([^:]+):"
  name: "kafka_connect_worker_metrics_$1"
- pattern : "kafka.connect<type=connect-metrics, client-id=([^:]+)><>([^:]+)"
  name: "kafka_connect_metrics_$2"
  labels:
    client: "$1"
# Per-connector identity (name, version, class, type, status) from Kafka Connect's connector-metrics
# MBeans. The string attribute value is captured as a label so it can be shown on the dashboard.
- pattern: "kafka.connect<type=connector-metrics, connector=(.+)><>connector-version: (.+)"
  name: "kafka_connect_connector_version"
  value: 1
  labels:
    connector: "$1"
    version: "$2"
- pattern: "kafka.connect<type=connector-metrics, connector=(.+)><>connector-class: (.+)"
  name: "kafka_connect_connector_class"
  value: 1
  labels:
    connector: "$1"
    class: "$2"
- pattern: "kafka.connect<type=connector-metrics, connector=(.+)><>connector-type: (.+)"
  name: "kafka_connect_connector_type"
  value: 1
  labels:
    connector: "$1"
    type: "$2"
- pattern: "kafka.connect<type=connector-metrics, connector=(.+)><>status: (.+)"
  name: "kafka_connect_connector_status"
  value: 1
  labels:
    connector: "$1"
    status: "$2"
# Per-task throughput for the data-flow view: source connector writes to Kafka, sink connector reads
# from Kafka and sends downstream.
- pattern: "kafka.connect<type=source-task-metrics, connector=(.+), task=(.+)><>source-record-write-total"
  name: "kafka_connect_source_record_write_total"
  labels:
    connector: "$1"
    task: "$2"
- pattern: "kafka.connect<type=source-task-metrics, connector=(.+), task=(.+)><>source-record-poll-total"
  name: "kafka_connect_source_record_poll_total"
  labels:
    connector: "$1"
    task: "$2"
- pattern: "kafka.connect<type=sink-task-metrics, connector=(.+), task=(.+)><>sink-record-read-total"
  name: "kafka_connect_sink_record_read_total"
  labels:
    connector: "$1"
    task: "$2"
- pattern: "kafka.connect<type=sink-task-metrics, connector=(.+), task=(.+)><>sink-record-send-total"
  name: "kafka_connect_sink_record_send_total"
  labels:
    connector: "$1"
    task: "$2"
- pattern: "debezium.([^:]+)<type=connector-metrics, context=([^,]+), server=([^,]+), key=([^>]+)><>RowsScanned"
  name: "debezium_metrics_RowsScanned"
  labels:
    plugin: "$1"
    name: "$3"
    context: "$2"
    table: "$4"
- pattern: "debezium.([^:]+)<type=connector-metrics, server=([^,]+), task=([^,]+), context=([^,]+), database=([^>]+)>([^:]+)"
  name: "debezium_metrics_$6"
  labels:
    plugin: "$1"
    name: "$2"
    task: "$3"
    context: "$4"
    database: "$5"
- pattern: "debezium.([^:]+)<type=connector-metrics, server=([^,]+), task=([^,]+), context=([^>]+)>([^:]+)"
  name: "debezium_metrics_$5"
  labels:
    plugin: "$1"
    name: "$2"
    task: "$3"
    context: "$4"
- pattern: "debezium.([^:]+)<type=connector-metrics, context=([^,]+), server=([^>]+)>([^:]+)"
  name: "debezium_metrics_$4"
  labels:
    plugin: "$1"
    name: "$3"
    context: "$2"
